<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Bodegas - SO Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-border { border: 1px solid #e5e7eb; padding: 10px; margin-bottom: 10px; break-inside: avoid; }
            input, textarea { border: none !important; resize: none; }
            .accordion-content { display: block !important; }
        }
        .color-radio input[type="radio"] { display: none; }
        .color-radio label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            color: #333;
            border: 2px solid transparent;
            transition: transform 0.1s, border-color 0.1s;
        }
        .color-radio input[type="radio"]:checked + label {
            transform: scale(1.15);
            border-color: #000;
            color: #000;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        #signature-pad {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }
        /* Estilos del Modal de Resultados */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            max-width: 600px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-bold text-blue-800 mb-2">SO Soluciones</h2>
            <h3 class="text-lg text-gray-600 mb-6">Acceso a Inspección</h3>
            <div class="mb-4 text-left">
                <label class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" id="username" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <div class="mb-6 text-left">
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <p id="loginError" class="text-red-500 text-sm hidden mb-4">Usuario o contraseña incorrectos.</p>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Ingresar</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 md:p-8 max-w-7xl mx-auto">
        <div id="captureArea" class="bg-white shadow-xl rounded-lg overflow-hidden">
            
            <div class="bg-blue-800 text-white p-6 flex flex-col md:flex-row justify-between items-center">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-bold uppercase">Inspección de Bodegas</h1>
                    <h2 class="text-xl opacity-90">Salud Ocupacional</h2>
                </div>
                <div class="mt-4 md:mt-0 bg-white text-blue-900 px-4 py-1 rounded font-black text-xl">
                    SO SOLUCIONES
                </div>
            </div>

            <form id="inspectionForm" class="p-6">
                <section class="mb-8 print-border">
                    <h3 class="text-xl font-semibold border-b-2 border-blue-800 pb-2 mb-4 text-blue-800">DATOS GENERALES</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div><label class="block text-sm font-medium text-gray-700">Fecha</label><input type="date" id="doc-fecha" class="mt-1 w-full rounded-md border-gray-300 border p-2" required></div>
                        <div><label class="block text-sm font-medium text-gray-700">Bodega</label><input type="text" id="doc-bodega" class="mt-1 w-full rounded-md border-gray-300 border p-2" required></div>
                        <div><label class="block text-sm font-medium text-gray-700">Responsable</label><input type="text" id="doc-resp" class="mt-1 w-full rounded-md border-gray-300 border p-2" required></div>
                        <div><label class="block text-sm font-medium text-gray-700">Inspector</label><input type="text" id="doc-insp" class="mt-1 w-full rounded-md border-gray-300 border p-2" required></div>
                    </div>
                </section>

                <div id="questionsContainer" class="space-y-4"></div>

                <section class="mt-8 pt-6 border-t-2 border-gray-200 print-border">
                    <h3 class="text-xl font-semibold text-blue-800 mb-4">Firma del Inspector</h3>
                    <div class="flex flex-col items-center">
                        <canvas id="signature-pad" width="400" height="200" class="bg-gray-50 w-full max-w-[400px]"></canvas>
                        <button type="button" onclick="clearSignature()" class="mt-3 text-sm text-red-600 font-semibold no-print">Limpiar Firma</button>
                    </div>
                </section>

                <div class="mt-8 flex flex-col md:flex-row justify-end gap-4 no-print border-t pt-6">
                    <button type="button" onclick="exportToPDF()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow">
                        Solo Guardar PDF
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow">
                        Calcular Resultados
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="resultsModal" class="modal-overlay">
        <div class="modal-content">
            <div id="modalIcon" class="w-20 h-20 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-lg"></div>
            <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
            <p id="modalPercentage" class="text-4xl font-black text-gray-800 mb-4"></p>
            <div class="text-left bg-gray-50 p-4 rounded-lg mb-6">
                <h4 class="font-bold text-blue-800 mb-2 uppercase text-xs tracking-widest">Recomendaciones:</h4>
                <p id="modalDescription" class="text-sm text-gray-600"></p>
            </div>
            <button onclick="closeModal()" class="bg-gray-800 text-white px-8 py-2 rounded-full font-bold hover:bg-black transition">Cerrar</button>
        </div>
    </div>

    <script>
        const dataConfig = [
            { category: "1. UBICACIÓN", items: ["Guardar una distancia mínima de 3 metros del límite de propiedad y de la vía pública.","Guardar una distancia mínima de 3 metros de otras edificaciones existentes en el mismo terreno (excepto afines).","Estar ubicados frente a vía pública o contar con un camino de acceso de ancho no menor de 5 metros.","Guardar una distancia mínima de 10 metros del limite de propiedad, vía pública u otras edificaciones (según corresponda).","Protección de las fuentes de agua superficiales o subterráneas (distancias según Ley Forestal).","No ubicarse a menos de 50 metros de un centro educativo, hospital o clínica."] },
            { category: "2. CONDICIONES FISICO SANITARIAS", items: ["Pisos, paredes, mezanines y estructuras internas resistentes al fuego, lisos, no porosos y que no se reblandezcan.","Recipiente vacío para casos de derrames y dos sacos con materia absorbente, debidamente rotulados.","Residuos de derrames manejados correctamente lejos de fuentes de agua.","Pisos con un desnivel del 1%, dirigido hacia el sistema de retención de derrames.","Techos con una altura mínima de 2.5 metros, medidos del piso al cielo raso o cercha.","Área de ventilación natural, no inferior al 20% de la superficie del piso.","Existencia de extintores tipo ABC, en buen estado, ubicados estratégicamente cada 125 m2.","Instalaciones eléctricas entubadas.","Separación de oficinas y áreas de expendio de la zona de almacenamiento (mín. 1.5m distancia, 1.3m altura).","Servicios sanitarios y duchas para el personal, en buenas condiciones de funcionamiento y limpieza.","Disponibilidad y uso adecuado del equipo de protección personal (carga, descarga, derrames).","Existencia de duchas de emergencia y fuente lavaojos, debidamente rotuladas y accesibles.","Separación clara de las áreas de comedor y de trabajo."] },
            { category: "3. ALMACENAMIENTO", items: ["Los estantes deben ser de material resistente al fuego e impermeable.","El almacenamiento en el estante debe permitir la circulación interna del aire.","La altura máxima para colocar los productos no mayor de las 3/4 partes de la altura total del establecimiento.","No deben existir instalaciones descubiertas o iluminación artificial directamente sobre los estantes.","Productos identificados con etiquetas y agrupados por afinidad.","Productos inflamables separados por una pared incombustible.","Separación entre estantes y pared: 25 cm (locales hasta 200m2) o 50 cm (locales > 200m2).","Pasillos entre estibas o estantes iguales o mayores a 80 cm.","Si es zona inundable, los productos están colocados a una altura 20% mayor que el nivel máximo de inundación."] },
            { category: "4. ORGANIZACIÓN DEL TRABAJO", items: ["Personal de carga/descarga utiliza ropa de trabajo adecuada.","Personal de sección de despacho utiliza vestimenta adecuada.","Personal sometido a examen médico pre-empleo y periódico según aplique.","Rótulos claros sobre riesgos asociados a los materiales almacenados.","Hojas de Seguridad (MSDS) de los productos almacenados disponibles.","Botiquín de emergencias acorde a riesgos y personal capacitado en su uso.","Rótulo visible con teléfonos de emergencias (Hospital, Cruz Roja, Bomberos).","Producto deteriorado o sin etiqueta es retirado y aislado para correcta disposición.","Desechos y envases vacíos tratados según el Plan de Manejo de Desechos de la Empresa.","Prohibido comer, fumar, beber en las áreas de almacenamiento."] },
            { category: "5. ASPECTOS LEGALES Y ADMINISTRATIVOS", items: ["Permiso de funcionamiento del Ministerio de Salud vigente.","Patentes municipales en lugar visible.","Archivados los informes de visitas de autoridades correspondientes.","Archivo de Hojas de Seguridad de cada producto almacenado al día.","Productos separados y almacenados por clase de riesgo.","Pasillos libres y demarcados.","Bodega presenta la debida rotulación de seguridad.","No se encuentran productos en mal estado, derramados o rotos.","No se encuentran productos vencidos.","Orden y limpieza general aceptable.","Equipo de protección personal en buenas condiciones.","Equipo de recolección de derrames completo y en buenas condiciones."] },
            { category: "6. TRANSPORTE DE MATERIALES", items: ["No se transportan materiales peligrosos en la cabina del conductor junto a pasajeros.","No se transportan materiales químicos junto a ropa o alimentos.","Al cargar/descargar se verifica que envases estén en buen estado, etiquetados y cerrados.","No se come, fuma o bebe mientras se carga o descarga.","La carga está bien asegurada.","Estiba uniforme de los productos.","Vehículo en buen estado físico y mecánico.","No se deja el vehículo cargado de productos peligrosos sin vigilancia.","Vehículo identificado con el nombre de la empresa.","Se mantiene equipo de protección básico en el vehículo.","Se mantiene kit anti derrame y extintor en el vehículo.","Cuenta con hojas MSDS del material que transporta.","Chofer cuenta con licencia al día y adecuada para el vehículo.","Vehículo cuenta con RTV y Marchamo al día."] },
            { category: "7. OBLIGACIONES", items: ["Representante legal y responsable de bodega hacen cumplir las disposiciones de seguridad."] }
        ];

        const scaleColors = ["#ef4444", "#f87171", "#f97316", "#fb923c", "#facc15", "#eab308", "#a3e635", "#84cc16", "#4ade80", "#22c55e", "#16a34a"];
        let questionCounter = 0;

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'Admin' && pass === 'SOdevelomping') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initSignaturePad();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let htmlContent = '';
            dataConfig.forEach((section, sIndex) => {
                const sectionId = `section-${sIndex}`;
                htmlContent += `
                <div class="border border-gray-200 rounded-md bg-white print-border">
                    <button type="button" onclick="toggleSection('${sectionId}')" class="w-full text-left px-4 py-3 bg-blue-100 text-blue-900 font-bold flex justify-between items-center no-print">
                        <span>${section.category}</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="${sectionId}" class="accordion-content hidden p-4">
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-sm text-left">
                                <thead class="bg-gray-50 border-b">
                                    <tr>
                                        <th class="px-2 py-3 w-1/3">Requerimiento</th>
                                        <th class="px-2 py-3 w-1/3 text-center">Puntaje</th>
                                        <th class="px-2 py-3 w-1/6">Evidencia</th>
                                        <th class="px-2 py-3 w-1/6">Notas</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                section.items.forEach((item) => {
                    questionCounter++;
                    let scaleHtml = '<div class="flex flex-wrap gap-1 justify-center">';
                    for(let i=0; i<=10; i++){
                        scaleHtml += `
                            <div class="color-radio">
                                <input type="radio" id="q${questionCounter}_${i}" name="q${questionCounter}" value="${i}" required>
                                <label for="q${questionCounter}_${i}" style="background-color: ${scaleColors[i]}33; color: ${scaleColors[i]}; border-color: ${scaleColors[i]}" onclick="applyColor(this, '${scaleColors[i]}', 'q${questionCounter}')">${i}</label>
                            </div>`;
                    }
                    scaleHtml += '</div>';
                    htmlContent += `
                        <tr class="border-b">
                            <td class="px-2 py-3 font-medium">${questionCounter}. ${item}</td>
                            <td class="px-2 py-3 text-center">${scaleHtml}</td>
                            <td class="px-2 py-3"><input type="file" class="text-xs w-full"></td>
                            <td class="px-2 py-2"><textarea name="obs${questionCounter}" class="w-full border rounded p-1 text-xs" rows="2"></textarea></td>
                        </tr>`;
                });
                htmlContent += `</tbody></table></div></div></div>`;
            });
            container.innerHTML = htmlContent;
        }

        function toggleSection(id) {
            const content = document.getElementById(id);
            content.classList.toggle('hidden');
        }

        function applyColor(labelEl, color, groupName) {
            const labels = document.querySelectorAll(`input[name="${groupName}"] + label`);
            labels.forEach(l => {
                const bc = l.style.borderColor;
                l.style.backgroundColor = bc + '33';
                l.style.color = bc;
            });
            labelEl.style.backgroundColor = color;
            labelEl.style.color = 'white';
        }

        // --- EXPORTACIÓN PDF RESUMIDA ---
        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.fontFamily = 'Arial';
            
            let html = `
                <div style="border-bottom: 2px solid #1e3a8a; padding-bottom: 10px; margin-bottom: 20px;">
                    <h1 style="color: #1e3a8a; margin: 0;">SO SOLUCIONES - REPORTE TÉCNICO</h1>
                    <p style="margin: 5px 0;">Inspección de Bodegas y Salud Ocupacional</p>
                </div>
                <table style="width: 100%; margin-bottom: 20px; font-size: 12px;">
                    <tr><td><strong>Bodega:</strong> ${document.getElementById('doc-bodega').value}</td><td><strong>Fecha:</strong> ${document.getElementById('doc-fecha').value}</td></tr>
                    <tr><td><strong>Responsable:</strong> ${document.getElementById('doc-resp').value}</td><td><strong>Inspector:</strong> ${document.getElementById('doc-insp').value}</td></tr>
                </table>
                <table style="width: 100%; border-collapse: collapse; font-size: 10px;">
                    <thead>
                        <tr style="background: #f3f4f6; border-bottom: 1px solid #000;">
                            <th style="padding: 5px; text-align: left;">Ítem</th>
                            <th style="padding: 5px; text-align: center;">Pts</th>
                            <th style="padding: 5px; text-align: left;">Observaciones</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (let i = 1; i <= questionCounter; i++) {
                const radio = document.querySelector(`input[name="q${i}"]:checked`);
                const pts = radio ? radio.value : "N/A";
                const obs = document.getElementsByName(`obs${i}`)[0].value;
                const text = document.querySelectorAll('td.font-medium')[i-1].innerText;

                html += `
                    <tr style="border-bottom: 0.5px solid #eee;">
                        <td style="padding: 5px; width: 60%;">${text}</td>
                        <td style="padding: 5px; text-align: center; font-weight: bold;">${pts}</td>
                        <td style="padding: 5px; font-style: italic; color: #555;">${obs || '-'}</td>
                    </tr>
                `;
            }

            html += `</tbody></table>`;
            element.innerHTML = html;

            const opt = {
                margin: 10,
                filename: `Reporte_SO_Soluciones_${document.getElementById('doc-bodega').value}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }

        // --- CÁLCULO Y MODAL ---
        function calculateResults(e) {
            e.preventDefault();
            let totalPoints = 0;
            let answered = 0;
            for (let i = 1; i <= questionCounter; i++) {
                const radio = document.querySelector(`input[name="q${i}"]:checked`);
                if (radio) { totalPoints += parseInt(radio.value); answered++; }
            }
            if (answered < questionCounter) return alert("Por favor responda todos los ítems.");

            const pct = ((totalPoints / (questionCounter * 10)) * 100).toFixed(1);
            showModal(pct);
        }

        function showModal(pct) {
            const modal = document.getElementById('resultsModal');
            const icon = document.getElementById('modalIcon');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDescription');
            document.getElementById('modalPercentage').innerText = pct + "%";

            if (pct <= 65) {
                icon.className = "w-20 h-20 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-lg bg-red-600";
                icon.innerText = "!";
                title.innerText = "Nivel: INACEPTABLE";
                desc.innerText = "Intervención inmediata requerida. Riesgos altos detectados. Plan de acción correctivo en menos de 24 horas.";
            } else if (pct < 90) {
                icon.className = "w-20 h-20 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-lg bg-yellow-500";
                icon.innerText = "⚠";
                title.innerText = "Nivel: REGULAR";
                desc.innerText = "Se recomienda reforzar la señalización, capacitación del personal y mantenimiento preventivo de equipos.";
            } else {
                icon.className = "w-20 h-20 rounded-full mx-auto flex items-center justify-center text-white text-3xl font-bold mb-4 shadow-lg bg-green-600";
                icon.innerText = "✓";
                title.innerText = "Nivel: ACEPTABLE";
                desc.innerText = "Gestión óptima. Mantener los estándares actuales y realizar revisiones periódicas de mantenimiento.";
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('resultsModal').style.display = 'none'; }

        // --- FIRMA ---
        let canvas, ctx, isDrawing = false;
        function initSignaturePad() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                return { x: (e.clientX || e.touches[0].clientX) - rect.left, y: (e.clientY || e.touches[0].clientY) - rect.top };
            };
            const start = (e) => { isDrawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
            const draw = (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
            const end = () => { isDrawing = false; };
            canvas.onmousedown = canvas.ontouchstart = start;
            canvas.onmousemove = canvas.ontouchmove = draw;
            window.onmouseup = window.ontouchend = end;
        }
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            document.getElementById('inspectionForm').addEventListener('submit', calculateResults);
        });
    </script>
</body>
</html>
