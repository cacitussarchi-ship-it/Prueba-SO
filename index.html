<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Bodegas - SO Soluciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
        }
        .color-radio input[type="radio"] { display: none; }
        .color-radio label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-radio input[type="radio"]:checked + label {
            transform: scale(1.2);
            border-color: #000;
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        #signature-pad {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            touch-action: none;
        }
        /* Estilos para el Modal de Resultados */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-blue-800 mb-2">SO Soluciones</h2>
            <h3 class="text-lg text-gray-600 mb-6">Acceso a Inspección</h3>
            <div class="mb-4 text-left">
                <label class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" id="username" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <div class="mb-6 text-left">
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="mt-1 w-full border border-gray-300 rounded-md p-2">
            </div>
            <p id="loginError" class="text-red-500 text-sm hidden mb-4">Credenciales incorrectas.</p>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded">Ingresar</button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 md:p-8 max-w-7xl mx-auto">
        <div id="reportContent" class="bg-white shadow-xl rounded-lg overflow-hidden">
            
            <div class="bg-blue-800 text-white p-6 flex flex-col md:flex-row justify-between items-center">
                <div class="text-center md:text-left">
                    <h1 class="text-3xl font-bold">INSPECCIÓN DE BODEGAS</h1>
                    <h2 class="text-xl opacity-90">Salud Ocupacional</h2>
                </div>
                <div class="mt-4 md:mt-0 text-2xl font-black tracking-tighter border-2 border-white px-4 py-1">
                    SO SOLUCIONES
                </div>
            </div>

            <form id="inspectionForm" class="p-6">
                <section class="mb-8 p-4 border rounded-lg bg-gray-50">
                    <h3 class="text-lg font-bold text-blue-800 mb-4 border-b pb-2 uppercase">Datos del Reporte</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Fecha</label>
                            <input type="date" id="info-fecha" class="w-full border-b bg-transparent py-1 focus:outline-none" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Bodega / CEDI</label>
                            <input type="text" id="info-bodega" placeholder="Nombre de la instalación" class="w-full border-b bg-transparent py-1 focus:outline-none" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Responsable Bodega</label>
                            <input type="text" id="info-responsable" class="w-full border-b bg-transparent py-1 focus:outline-none" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase">Inspector</label>
                            <input type="text" id="info-inspector" class="w-full border-b bg-transparent py-1 focus:outline-none" required>
                        </div>
                    </div>
                </section>

                <div id="questionsContainer" class="space-y-6"></div>

                <section class="mt-8 pt-6 border-t">
                    <h3 class="text-xl font-semibold text-blue-800 mb-4">Firma de Responsabilidad</h3>
                    <div class="flex flex-col items-center">
                        <canvas id="signature-pad" width="400" height="180" class="bg-gray-50"></canvas>
                        <button type="button" onclick="clearSignature()" class="mt-2 text-sm text-red-500 hover:underline no-print">Borrar Firma</button>
                    </div>
                </section>

                <div class="mt-8 flex flex-col md:flex-row justify-end gap-4 no-print border-t pt-6">
                    <button type="button" onclick="generatePDF()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded shadow-lg transition">
                        Descargar Reporte PDF
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded shadow-lg transition">
                        Calcular y Ver Recomendaciones
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="resultsModal" class="modal">
        <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full mx-4 overflow-hidden">
            <div id="modalHeader" class="p-6 text-white text-center">
                <h3 class="text-3xl font-bold" id="modalScore">0%</h3>
                <p class="text-lg uppercase tracking-widest font-semibold" id="modalLevel"></p>
            </div>
            <div class="p-8">
                <h4 class="font-bold text-gray-800 mb-2">Análisis de Situación:</h4>
                <p id="modalDesc" class="text-gray-600 mb-6 italic border-l-4 border-blue-500 pl-4"></p>
                
                <h4 class="font-bold text-gray-800 mb-2">Recomendaciones Proactivas:</h4>
                <ul id="modalRecs" class="space-y-2 text-sm text-gray-700 list-disc pl-5">
                    </ul>

                <button onclick="closeModal()" class="mt-8 w-full bg-gray-800 text-white font-bold py-3 rounded-lg hover:bg-black transition">
                    Regresar a la Inspección
                </button>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Datos (Se mantiene igual que el original)
        const dataConfig = [
            { category: "1. UBICACIÓN", items: ["Guardar distancia mínima de 3m de límite propiedad.", "Ubicación frente a vía pública (acceso > 5m).", "Distancia de 50m de centros educativos/salud."] },
            { category: "2. CONDICIONES FISICO SANITARIAS", items: ["Pisos y paredes resistentes al fuego y no porosos.", "Kit de derrames (sacos absorbentes) rotulado.", "Ventilación natural > 20% del área.", "Extintores ABC cada 125 m2."] },
            { category: "3. ALMACENAMIENTO", items: ["Estantes de material incombustible.", "Altura máxima 3/4 partes de la altura total.", "Pasillos entre estantes >= 80 cm."] }
        ];

        const scaleColors = ["#ef4444","#f87171","#f97316","#fb923c","#facc15","#eab308","#a3e635","#84cc16","#4ade80","#22c55e","#16a34a"];
        let questionCounter = 0;

        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'Admin' && pass === 'SOdevelomping') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initSignaturePad();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            dataConfig.forEach((section, sIndex) => {
                html += `
                    <div class="border rounded-lg overflow-hidden bg-white shadow-sm">
                        <div class="bg-blue-50 px-4 py-2 font-bold text-blue-900 border-b">${section.category}</div>
                        <div class="p-4 overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead><tr class="text-gray-500 border-b"><th class="text-left pb-2">Requerimiento</th><th class="pb-2">Puntaje</th><th class="pb-2">Evidencia/Notas</th></tr></thead>
                                <tbody>
                `;
                section.items.forEach(item => {
                    questionCounter++;
                    html += `
                        <tr class="border-b last:border-0">
                            <td class="py-4 pr-4 font-medium w-1/3">${questionCounter}. ${item}</td>
                            <td class="py-4 text-center">
                                <div class="flex gap-1 justify-center">
                                    ${scaleColors.map((col, i) => `
                                        <div class="color-radio">
                                            <input type="radio" id="q${questionCounter}_${i}" name="q${questionCounter}" value="${i}" required>
                                            <label for="q${questionCounter}_${i}" style="background-color: ${col}22; color: ${col}; border: 1px solid ${col}">${i}</label>
                                        </div>
                                    `).join('')}
                                </div>
                            </td>
                            <td class="py-4">
                                <input type="file" class="text-xs mb-1 block w-full">
                                <textarea name="obs${questionCounter}" class="w-full border rounded p-1 text-xs" rows="1" placeholder="Observaciones..."></textarea>
                            </td>
                        </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });
            container.innerHTML = html;
        }

        // --- LÓGICA DE PDF ---
        function generatePDF() {
            const element = document.getElementById('reportContent');
            const opt = {
                margin: 10,
                filename: `Inspeccion_SO_Soluciones_${new Date().toLocaleDateString()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            // Ocultar elementos que no queremos en el PDF
            const noPrint = document.querySelectorAll('.no-print');
            noPrint.forEach(el => el.style.display = 'none');
            
            html2pdf().set(opt).from(element).save().then(() => {
                noPrint.forEach(el => el.style.display = '');
            });
        }

        // --- RESULTADOS Y MODAL ---
        function calculateResults(e) {
            e.preventDefault();
            let total = 0;
            let answered = 0;
            for (let i = 1; i <= questionCounter; i++) {
                const radios = document.getElementsByName(`q${i}`);
                radios.forEach(r => { if(r.checked) { total += parseInt(r.value); answered++; } });
            }

            if (answered < questionCounter) return alert("Complete todos los ítems.");

            const pct = ((total / (questionCounter * 10)) * 100).toFixed(1);
            showModal(pct);
        }

        function showModal(pct) {
            const modal = document.getElementById('resultsModal');
            const mHeader = document.getElementById('modalHeader');
            const mScore = document.getElementById('modalScore');
            const mLevel = document.getElementById('modalLevel');
            const mDesc = document.getElementById('modalDesc');
            const mRecs = document.getElementById('modalRecs');

            mScore.textContent = pct + "%";
            mRecs.innerHTML = '';
            
            let recs = [];
            if (pct <= 65) {
                mHeader.className = "p-6 text-white text-center bg-red-600";
                mLevel.textContent = "Nivel: INACEPTABLE";
                mDesc.textContent = "Se requiere un plan de acción correctivo de forma inmediata. La bodega no cumple con los estándares mínimos de seguridad.";
                recs = ["Suspender actividades de alto riesgo", "Capacitar al personal en SO", "Corregir deficiencias en infraestructura antes de 48h"];
            } else if (pct < 90) {
                mHeader.className = "p-6 text-white text-center bg-yellow-500";
                mLevel.textContent = "Nivel: REGULAR";
                mDesc.textContent = "Existen controles, pero hay brechas importantes que comprometen la seguridad a mediano plazo.";
                recs = ["Reforzar señalización", "Programar mantenimientos preventivos", "Mejorar el orden y limpieza (5S)"];
            } else {
                mHeader.className = "p-6 text-white text-center bg-green-600";
                mLevel.textContent = "Nivel: ACEPTABLE";
                mDesc.textContent = "Gestión sobresaliente. Se recomienda mantener el estándar y buscar la mejora continua.";
                recs = ["Digitalizar reportes históricos", "Realizar simulacros sorpresa", "Compartir buenas prácticas con otros CEDI"];
            }

            recs.forEach(r => { mRecs.innerHTML += `<li>${r}</li>`; });
            modal.classList.add('active');
        }

        function closeModal() { document.getElementById('resultsModal').classList.remove('active'); }

        // --- FIRMA (Simplificada) ---
        let canvas, ctx, isDrawing = false;
        function initSignaturePad() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            const start = (e) => { isDrawing = true; draw(e); };
            const stop = () => { isDrawing = false; ctx.beginPath(); };
            const draw = (e) => {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineWidth = 2; ctx.lineTo(x, y); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x, y);
            };
            canvas.onmousedown = canvas.ontouchstart = start;
            canvas.onmouseup = canvas.ontouchend = stop;
            canvas.onmousemove = canvas.ontouchmove = draw;
        }
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            document.getElementById('inspectionForm').onsubmit = calculateResults;
        });
    </script>
</body>
</html>
