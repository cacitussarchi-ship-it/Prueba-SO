<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inspección de Bodegas - Salud Ocupacional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-border { border: 1px solid #e5e7eb; padding: 10px; margin-bottom: 10px; break-inside: avoid; }
            input, textarea { border: none !important; resize: none; }
            .accordion-content { display: block !important; }
        }
        
        .color-radio input[type="radio"] { display: none; }
        .color-radio label {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }
        .color-radio input[type="radio"]:checked + label {
            transform: scale(1.1);
            border-color: #000;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        
        #signature-pad {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <div id="loginScreen" class="fixed inset-0 bg-blue-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-2xl font-bold text-blue-800 mb-6">Acceso a Inspección</h2>
            <div class="mb-4 text-left">
                <label class="block text-sm font-medium text-gray-700">Usuario</label>
                <input type="text" id="username" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="mb-6 text-left">
                <label class="block text-sm font-medium text-gray-700">Contraseña</label>
                <input type="password" id="password" class="mt-1 w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <p id="loginError" class="text-red-500 text-sm hidden mb-4">Usuario o contraseña incorrectos.</p>
            <button onclick="checkLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Ingresar
            </button>
        </div>
    </div>

    <div id="mainApp" class="hidden p-4 md:p-8 max-w-7xl mx-auto">
        <div class="bg-white shadow-xl rounded-lg overflow-hidden">
            <div class="bg-blue-800 text-white p-6 text-center">
                <h1 class="text-3xl font-bold">INSPECCIÓN DE BODEGAS</h1>
                <h2 class="text-xl mt-2">Salud Ocupacional</h2>
            </div>

            <form id="inspectionForm" class="p-6">
                <section class="mb-8 print-border">
                    <h3 class="text-xl font-semibold border-b-2 border-blue-800 pb-2 mb-4 text-blue-800">DATOS GENERALES</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Fecha de Inspección</label>
                            <input type="date" class="mt-1 w-full rounded-md border-gray-300 border p-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Bodega</label>
                            <input type="text" placeholder="Ej. CEDI CENTRAL" class="mt-1 w-full rounded-md border-gray-300 border p-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Nombre del Bodeguero</label>
                            <input type="text" class="mt-1 w-full rounded-md border-gray-300 border p-2" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Encargado o Regente</label>
                            <input type="text" class="mt-1 w-full rounded-md border-gray-300 border p-2" required>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium text-gray-700">Realizó (Inspector)</label>
                            <input type="text" class="mt-1 w-full rounded-md border-gray-300 border p-2" required>
                        </div>
                    </div>
                </section>

                <div class="bg-blue-50 p-4 rounded-md mb-8 text-sm text-blue-800 border border-blue-200">
                    <strong>Instrucciones:</strong> Califique cada punto: <span class="text-red-600 font-bold">0 (Inaceptable)</span>, <span class="text-orange-600 font-bold">5 (Requiere Mejora)</span> o <span class="text-green-600 font-bold">10 (Aceptable)</span>.
                </div>

                <div id="questionsContainer" class="space-y-4"></div>

                <section class="mt-8 pt-6 border-t-2 border-gray-200 print-border">
                    <h3 class="text-xl font-semibold text-blue-800 mb-4">Firma del Inspector</h3>
                    <div class="flex flex-col items-center">
                        <canvas id="signature-pad" width="400" height="200" class="bg-gray-50 w-full max-w-[400px]"></canvas>
                        <button type="button" onclick="clearSignature()" class="mt-3 text-sm text-red-600 font-semibold hover:underline no-print">
                            Limpiar Firma
                        </button>
                    </div>
                </section>

                <div class="mt-8 flex flex-col md:flex-row justify-end gap-4 no-print border-t pt-6">
                    <button type="button" onclick="window.print()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded shadow">
                        Imprimir / Guardar PDF
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow">
                        Calcular Resultados
                    </button>
                </div>
            </form>

            <div id="resultsSection" class="hidden p-6 bg-gray-50 border-t-4 border-blue-800 mt-6">
                <h3 class="text-2xl font-bold text-center mb-4">RESULTADO DE LA INSPECCIÓN</h3>
                <div class="flex justify-center mb-6">
                    <div id="scoreCircle" class="w-40 h-40 rounded-full flex flex-col items-center justify-center text-white font-bold shadow-lg border-4 border-white">
                        <span id="scorePercentage" class="text-4xl">0%</span>
                        <span id="scorePoints" class="text-sm mt-1">0 / 0 Puntos</span>
                    </div>
                </div>
                <div id="scoreLevel" class="text-center text-xl font-bold mb-4 uppercase tracking-wider"></div>
                <p id="scoreDescription" class="text-center text-gray-600 max-w-2xl mx-auto"></p>
            </div>
        </div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'Admin' && pass === 'SOdevelomping') {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                initSignaturePad();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        const dataConfig = [
            { category: "1. UBICACIÓN", items: ["Distancia mín. 3m del límite de propiedad/vía pública.", "Distancia mín. 3m de otras edificaciones.", "Acceso de ancho no menor de 5 metros.", "Protección de fuentes de agua (Ley Forestal).", "No estar a menos de 50m de centros educativos/salud."] },
            { category: "2. CONDICIONES FISICO SANITARIAS", items: ["Pisos y paredes resistentes al fuego y lisos.", "Recipiente para derrames y sacos de absorbente rotulados.", "Desnivel de pisos (1%) hacia retención de derrames.", "Techos altura mín. 2.5m.", "Ventilación natural mín. 20% del área de piso.", "Extintores ABC vigentes cada 125m2.", "Instalaciones eléctricas entubadas.", "Duchas de emergencia y lavaojos accesibles."] },
            { category: "3. ALMACENAMIENTO", items: ["Estantes de material incombustible e impermeable.", "Altura máx. no superior a 3/4 de la altura total.", "Productos agrupados por afinidad y etiquetados.", "Pasillos entre estantes iguales o mayores a 80cm.", "Separación entre estantes y pared (25cm o 50cm)."] },
            { category: "4. ORGANIZACIÓN DEL TRABAJO", items: ["Personal con equipo de protección personal (EPP).", "Hojas de Seguridad (MSDS) disponibles.", "Botiquín de emergencias completo.", "Prohibido comer, fumar o beber en bodega.", "Desechos tratados según Plan de Manejo."] },
            { category: "5. ASPECTOS LEGALES", items: ["Permiso de Funcionamiento vigente.", "Patente municipal visible.", "Registro de productos al día.", "Orden y limpieza general aceptable."] }
        ];

        // Escala simplificada: 0 (Rojo), 5 (Naranja), 10 (Verde)
        const simplifiedScale = [
            { val: 0, color: "#ef4444", label: "Inaceptable" },
            { val: 5, color: "#f97316", label: "Mejora" },
            { val: 10, color: "#16a34a", label: "Aceptable" }
        ];

        let totalQuestions = 0;

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            let html = '';
            let qIdx = 1;

            dataConfig.forEach((sec, sIdx) => {
                const secId = `sec-${sIdx}`;
                html += `
                <div class="border border-gray-200 rounded-md bg-white print-border">
                    <button type="button" onclick="toggleSection('${secId}')" class="w-full text-left px-4 py-3 bg-blue-100 text-blue-900 font-bold flex justify-between items-center no-print">
                        <span>${sec.category}</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                    </button>
                    <div id="${secId}" class="accordion-content hidden p-4">
                        <div class="overflow-x-auto">
                            <table class="min-w-full text-sm">
                                <thead class="bg-gray-50 border-b">
                                    <tr>
                                        <th class="px-2 py-3 w-1/2">Requerimiento</th>
                                        <th class="px-2 py-3 text-center">Calificación</th>
                                        <th class="px-2 py-3">Observaciones</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                
                sec.items.forEach(item => {
                    let scaleHtml = '<div class="flex gap-2 justify-center">';
                    simplifiedScale.forEach(s => {
                        scaleHtml += `
                        <div class="color-radio">
                            <input type="radio" id="q${qIdx}_${s.val}" name="q${qIdx}" value="${s.val}" required>
                            <label for="q${qIdx}_${s.val}" style="color: ${s.color}; background-color: ${s.color}22; border: 2px solid ${s.color}" 
                                   onclick="selectRadio(this, '${s.color}', 'q${qIdx}')">
                                ${s.val}
                            </label>
                        </div>`;
                    });
                    scaleHtml += '</div>';

                    html += `
                    <tr class="border-b">
                        <td class="px-2 py-4 font-medium">${qIdx}. ${item}</td>
                        <td class="px-2 py-4">${scaleHtml}</td>
                        <td class="px-2 py-2"><textarea name="obs${qIdx}" class="w-full border rounded p-1 text-xs" rows="2"></textarea></td>
                    </tr>`;
                    qIdx++;
                });

                html += `</tbody></table></div></div></div>`;
            });
            totalQuestions = qIdx - 1;
            container.innerHTML = html;
        }

        function selectRadio(labelEl, color, group) {
            const labels = document.querySelectorAll(`input[name="${group}"] + label`);
            labels.forEach(l => {
                const origColor = l.style.borderColor;
                l.style.backgroundColor = origColor + '22';
                l.style.color = origColor;
            });
            labelEl.style.backgroundColor = color;
            labelEl.style.color = 'white';
        }

        function toggleSection(id) {
            document.getElementById(id).classList.toggle('hidden');
        }

        // --- FIRMA ---
        let canvas, ctx, isDrawing = false;
        function initSignaturePad() {
            canvas = document.getElementById('signature-pad');
            ctx = canvas.getContext('2d');
            const events = [['mousedown', start], ['mouseup', end], ['mousemove', move], ['touchstart', start], ['touchend', end], ['touchmove', move]];
            events.forEach(e => canvas.addEventListener(e[0], e[1], {passive: false}));
        }
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const c = e.touches ? e.touches[0] : e;
            return { x: c.clientX - r.left, y: c.clientY - r.top };
        }
        function start(e) { if(e.type === 'touchstart') e.preventDefault(); isDrawing = true; draw(e); }
        function end() { isDrawing = false; ctx.beginPath(); }
        function move(e) { if(!isDrawing) return; if(e.type === 'touchmove') e.preventDefault(); const p = getPos(e); ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- RESULTADOS ---
        function calculateResults(e) {
            e.preventDefault();
            let score = 0, answered = 0;
            for(let i=1; i<=totalQuestions; i++) {
                const val = document.querySelector(`input[name="q${i}"]:checked`);
                if(val) { score += parseInt(val.value); answered++; }
            }
            if(answered < totalQuestions) return alert("Complete todos los puntos.");
            
            const pct = (score / (totalQuestions * 10)) * 100;
            displayResults(score, totalQuestions * 10, pct.toFixed(1));
        }

        function displayResults(pts, max, pct) {
            const sec = document.getElementById('resultsSection');
            const circ = document.getElementById('scoreCircle');
            sec.classList.remove('hidden');
            document.getElementById('scorePercentage').textContent = pct + '%';
            document.getElementById('scorePoints').textContent = `${pts} / ${max} Pts`;
            
            circ.className = "w-40 h-40 rounded-full flex flex-col items-center justify-center text-white font-bold shadow-lg border-4 border-white ";
            const lvl = document.getElementById('scoreLevel');
            const desc = document.getElementById('scoreDescription');

            if(pct < 70) {
                circ.classList.add('bg-red-500');
                lvl.textContent = "INACEPTABLE";
                desc.textContent = "Intervención inmediata requerida. Riesgos críticos detectados.";
            } else if(pct < 90) {
                circ.classList.add('bg-orange-500');
                lvl.textContent = "REGULAR";
                desc.textContent = "Se cumplen medidas básicas, pero requiere mejoras para alcanzar el estándar óptimo.";
            } else {
                circ.classList.add('bg-green-500');
                lvl.textContent = "ACEPTABLE";
                desc.textContent = "Nivel de cumplimiento satisfactorio. Mantener la mejora continua.";
            }
            sec.scrollIntoView({behavior: 'smooth'});
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderQuestions();
            document.getElementById('inspectionForm').addEventListener('submit', calculateResults);
        });
    </script>
</body>
</html>
