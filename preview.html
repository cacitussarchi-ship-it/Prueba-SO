<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO Inspect</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f7f6;
}

header {
  background: #1f7a63;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

h2 {
  color: #1f7a63;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  background: #1f7a63;
  color: white;
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #145c4b;
}

canvas {
  border: 1px solid #ccc;
  width: 100%;
  height: 150px;
}

.result {
  font-size: 18px;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h1>SO Inspect</h1>
</header>

<div class="container">

  <!-- DATOS GENERALES -->
  <div class="card">
    <h2>Datos Generales</h2>
    <input type="text" id="empresa" placeholder="Empresa">
    <input type="text" id="ubicacion" placeholder="Ubicación">
    <input type="text" id="inspector" placeholder="Inspector">
    <input type="date" id="fecha">
  </div>

  <!-- CHECKLIST -->
  <div class="card">
    <h2>1. Condiciones Generales</h2>

    <label>¿La bodega está limpia?</label>
    <select class="respuesta">
      <option value="1">Cumple</option>
      <option value="0">No cumple</option>
      <option value="0.5">Parcial</option>
    </select>

    <label>¿Existe señalización?</label>
    <select class="respuesta">
      <option value="1">Cumple</option>
      <option value="0">No cumple</option>
      <option value="0.5">Parcial</option>
    </select>

    <label>Observaciones</label>
    <textarea></textarea>
  </div>

  <!-- FOTO -->
  <div class="card">
    <h2>Foto de evidencia</h2>
    <input type="file" accept="image/*">
  </div>

  <!-- FIRMA -->
  <div class="card">
    <h2>Firma</h2>
    <canvas id="firma"></canvas>
    <button onclick="limpiarFirma()">Limpiar Firma</button>
  </div>

  <!-- RESULTADO -->
  <div class="card">
    <button onclick="calcular()">Finalizar Inspección</button>
    <div class="result" id="resultado"></div>
  </div>

</div>

<script>
// FIRMA
let canvas = document.getElementById("firma");
let ctx = canvas.getContext("2d");
let dibujando = false;

canvas.addEventListener("mousedown", () => dibujando = true);
canvas.addEventListener("mouseup", () => dibujando = false);
canvas.addEventListener("mousemove", dibujar);

canvas.addEventListener("touchstart", () => dibujando = true);
canvas.addEventListener("touchend", () => dibujando = false);
canvas.addEventListener("touchmove", dibujarTouch);

function dibujar(e) {
  if (!dibujando) return;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
}

function dibujarTouch(e) {
  if (!dibujando) return;
  let rect = canvas.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;
  let y = e.touches[0].clientY - rect.top;

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineTo(x, y);
  ctx.stroke();
}

function limpiarFirma() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// RESULTADO
function calcular() {
  let respuestas = document.querySelectorAll(".respuesta");
  let total = 0;

  respuestas.forEach(r => {
    total += parseFloat(r.value);
  });

  let puntaje = (total / respuestas.length) * 100;

  let estado = "";
  if (puntaje >= 80) estado = "✅ Cumple";
  else if (puntaje >= 50) estado = "⚠️ Parcial";
  else estado = "❌ No cumple";

  document.getElementById("resultado").innerHTML =
    `Puntaje: ${puntaje.toFixed(1)}% <br> Estado: ${estado}`;
}
</script>

</body>
</html>
